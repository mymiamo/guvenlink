<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Güvenlik Uyarısı</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="warning">
  <main class="warning-shell">
    <section class="card warning-card">
      <div class="warning-icon" style="margin-bottom: 24px; color: var(--malicious);">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
      </div>
      <p class="eyebrow" style="color: var(--malicious);">Erişim Durduruldu</p>
      <h1>Zararlı Bağlantı!</h1>
      <p id="targetUrl" class="muted break" style="background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px; font-family: monospace; font-size: 13px;"></p>
      <ul id="warningReasons" class="reasons"></ul>
      <div class="button-row" style="margin-top: 32px;">
        <button id="goBack" style="background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text-primary);">Geri Dön</button>
        <button id="continueAnyway" style="background: var(--malicious);">Riskli Siteye Devam Et</button>
      </div>
    </section>
  </main>
  <script src="shared.js"></script>
  <script src="warning.js"></script>
</body>
</html>
