<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Guvenlink</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="popup">
  <main class="panel">
    <section class="hero">
      <p class="eyebrow">Guvenlik Denetimi</p>
      <h1 id="verdictLabel">Bekleniyor...</h1>
      <p id="hostname" class="muted"></p>
      <span id="verdictBadge" class="state state-safe">Guvenli</span>
    </section>

    <section class="card">
      <h2>Detaylar</h2>
      <ul id="reasons" class="reasons"></ul>
      <div class="card-footer">
        <div class="footer-item">
          <span class="muted small">Son guncelleme</span>
          <span id="updatedAt" class="small">-</span>
        </div>
        <div class="footer-item">
          <span class="muted small">Kaynak</span>
          <span id="source" class="small">-</span>
        </div>
      </div>
      <div id="referenceWrap" class="button-row hidden">
        <a id="referenceButton" class="button-link" target="_blank" rel="noreferrer">USOM Kaydini Ac</a>
      </div>
    </section>

    <section class="card">
      <h2>Ayarlar</h2>
      <div class="settings-grid">
        <label class="setting-field">
          <span>Guvenlik Davranisi</span>
          <select id="securityMode">
            <option value="strict">Kati</option>
            <option value="balanced">Dengeli</option>
            <option value="informational">Sadece Bilgilendir</option>
          </select>
        </label>
        <label class="setting-field">
          <span>Tema</span>
          <select id="themeMode">
            <option value="dark">Koyu</option>
            <option value="light">Acik</option>
          </select>
        </label>
      </div>
      <div class="button-row">
        <button id="saveSettings" class="button-link button-button" type="button">Ayarlari Kaydet</button>
      </div>
    </section>

    <section class="support-row">
      <a class="support-link" href="https://github.com/your-username/guvenlink" target="_blank" rel="noreferrer">GitHub Destek Ver</a>
    </section>
  </main>
  <script src="shared.js"></script>
  <script src="popup.js"></script>
</body>
</html>
